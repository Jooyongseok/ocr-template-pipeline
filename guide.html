<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Pipeline - Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--s:#18181b;--c:#27272a;--bd:#3f3f46;--tx:#fafafa;--tx2:#a1a1aa;--tx3:#71717a;--ac:#6366f1;--ac2:#818cf8;--g:#22c55e;--y:#eab308;--r:#ef4444;--o:#f97316;--t:#2dd4bf;--rd:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);line-height:1.8;font-size:15px}
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(9,9,11,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);z-index:100;display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar .logo{font-size:16px;font-weight:700;color:var(--ac2)}
.topbar .nav-links{display:flex;gap:2px;overflow-x:auto;flex:1}
.topbar .nav-links a{color:var(--tx3);text-decoration:none;font-size:12px;padding:5px 10px;border-radius:5px;white-space:nowrap}
.topbar .nav-links a:hover{color:var(--tx);background:var(--c)}
.lang-btn{background:var(--c);border:1px solid var(--bd);color:var(--ac2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.lang-btn:hover{background:var(--bd)}
main{max-width:860px;margin:0 auto;padding:72px 24px 60px}
.sec{margin-bottom:56px;scroll-margin-top:64px}
.sec-num{font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.sec h2{font-size:28px;font-weight:700;margin-bottom:8px}
.sec .desc{font-size:15px;color:var(--tx2);margin-bottom:24px;max-width:640px}
.steps{display:flex;flex-direction:column;gap:16px}
.step{display:flex;gap:16px;align-items:flex-start}
.step-num{width:48px;height:48px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.step-body{flex:1;background:var(--s);border:1px solid var(--bd);border-radius:var(--rd);padding:18px 20px}
.step-body h3{font-size:17px;margin-bottom:4px}
.step-body p{font-size:14px;color:var(--tx2)}
.card-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--rd);padding:20px}
.card h3{font-size:16px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.card p{font-size:14px;color:var(--tx2);line-height:1.7}
.card-icon{font-size:24px}
.color-row{display:flex;gap:20px;flex-wrap:wrap;margin:16px 0}
.color-item{display:flex;align-items:center;gap:10px;font-size:14px}
.color-dot{width:20px;height:20px;border-radius:50%}
.key-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.key-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s);border:1px solid var(--bd);border-radius:8px}
.key-item kbd{background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:5px 12px;font-family:monospace;font-size:14px;color:var(--o);min-width:60px;text-align:center}
.key-item span{font-size:14px;color:var(--tx2)}
.info-box{background:var(--s);border-left:4px solid var(--ac);border-radius:0 var(--rd) var(--rd) 0;padding:16px 20px;margin:16px 0;font-size:14px;color:var(--tx2)}
.info-box.warn{border-left-color:var(--y)}
.info-box strong{color:var(--tx)}
table{width:100%;border-collapse:collapse;background:var(--s);border-radius:var(--rd);overflow:hidden;margin:12px 0}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--bd);font-size:13px}
th{background:var(--c);color:var(--tx3);font-weight:600}
tr:last-child td{border-bottom:none}
details{background:var(--s);border:1px solid var(--bd);border-radius:var(--rd);margin-bottom:8px}
details summary{padding:14px 18px;cursor:pointer;font-size:15px;font-weight:600;list-style:none}
details summary::before{content:"Q. ";color:var(--ac2)}
details[open] summary{border-bottom:1px solid var(--bd)}
details .answer{padding:14px 18px;font-size:14px;color:var(--tx2);line-height:1.8}
footer{text-align:center;padding:32px;color:var(--tx3);font-size:12px;border-top:1px solid var(--bd)}
@media(max-width:640px){.step{flex-direction:column}.step-num{width:36px;height:36px;font-size:16px}.card-row{grid-template-columns:1fr}.key-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">OCR Guide</span>
  <div class="nav-links">
    <a href="#welcome">Home</a>
    <a href="#start" data-ko="시작" data-en="Start">시작</a>
    <a href="#template" data-ko="템플릿" data-en="Template">템플릿</a>
    <a href="#single" data-ko="단건" data-en="Single">단건</a>
    <a href="#batch" data-ko="배치" data-en="Batch">배치</a>
    <a href="#review" data-ko="검수" data-en="Review">검수</a>
    <a href="#keys" data-ko="단축키" data-en="Keys">단축키</a>
    <a href="#export" data-ko="내보내기" data-en="Export">내보내기</a>
    <a href="#faq">FAQ</a>
  </div>
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">English</button>
</div>

<main>

<div class="sec" id="welcome">
  <div class="sec-num">GUIDE</div>
  <h2 data-ko="OCR 문서 추출 시스템 사용 가이드" data-en="OCR Document Extraction Guide"></h2>
  <p class="desc" data-ko="이 시스템은 종이 서류를 스캔한 PDF에서 글자를 자동으로 읽어내는 프로그램입니다. 사람이 직접 타이핑하는 대신, 컴퓨터가 문서를 읽고, 사용자는 결과만 확인하면 됩니다." data-en="This system automatically reads text from scanned PDF documents. Instead of manually typing, the computer reads the document and you just verify the results."></p>
  <div class="card-row">
    <div class="card"><h3><span class="card-icon">&#9201;</span> <span data-ko="시간 절약" data-en="Save Time"></span></h3><p data-ko="문서 1건당 10-15분 걸리던 입력이 2-3분으로 줄어듭니다." data-en="Processing time drops from 10-15 minutes to just 2-3 minutes per document."></p></div>
    <div class="card"><h3><span class="card-icon">&#10003;</span> <span data-ko="오류 감소" data-en="Fewer Errors"></span></h3><p data-ko="사람의 타이핑 오류율 3-5%에서, AI 인식 오류율 2.6%로 개선됩니다." data-en="Human typing error rate of 3-5% improved to AI recognition error rate of 2.6%."></p></div>
    <div class="card"><h3><span class="card-icon">&#128202;</span> <span data-ko="데이터 활용" data-en="Data Utilization"></span></h3><p data-ko="종이에 갇혀있던 정보가 엑셀 데이터로 변환되어 분석과 활용이 가능해집니다." data-en="Information trapped on paper is converted to Excel data for analysis."></p></div>
  </div>
</div>

<div class="sec" id="start">
  <div class="sec-num" data-ko="01 / 시작하기" data-en="01 / GETTING STARTED"></div>
  <h2 data-ko="시스템 시작하기" data-en="Getting Started"></h2>
  <p class="desc" data-ko="처음 사용할 때 따라하세요." data-en="Follow these steps when using for the first time."></p>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h3 data-ko="웹 브라우저를 엽니다" data-en="Open your web browser"></h3><p data-ko="Chrome, Edge, Firefox 중 아무거나 사용하세요. 주소창에 시스템 URL을 입력합니다." data-en="Use Chrome, Edge, or Firefox. Enter the system URL in the address bar."></p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h3 data-ko="사용자 이름을 입력합니다" data-en="Enter your username"></h3><p data-ko="화면 오른쪽 위에 '사용자' 입력란이 있습니다. 본인의 이름이나 ID를 입력하세요." data-en="There is a 'User' field in the top-right corner. Enter your name or ID."></p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h3 data-ko="대시보드를 확인합니다" data-en="Check the dashboard"></h3><p data-ko="메인 화면에서 저장된 템플릿 목록과 3가지 탭을 볼 수 있습니다." data-en="The main screen shows saved templates and 3 tabs."></p></div></div>
  </div>
</div>

<div class="sec" id="template">
  <div class="sec-num" data-ko="02 / 템플릿" data-en="02 / TEMPLATES"></div>
  <h2 data-ko="템플릿 이해하기" data-en="Understanding Templates"></h2>
  <div class="info-box"><strong data-ko="템플릿이란?" data-en="What is a Template?"></strong><br><span data-ko="템플릿은 '문서의 어디에 어떤 정보가 있는지' 알려주는 설정 파일입니다. 마치 도장을 찍을 때 위치를 표시한 안내판처럼, 컴퓨터에게 '여기에 이름이 있고, 저기에 전화번호가 있다'고 알려줍니다." data-en="A template tells the system 'where each piece of information is located' on the document. Like a guide showing where to stamp, it tells the computer 'the name is here, the phone number is there.'"></span></div>
  <p data-ko="시스템에 이미 만들어진 템플릿이 있습니다. 대시보드의 'TEMPLATE' 카드에서 바로 사용하거나, '편집' 버튼으로 바운딩 박스 위치를 조정할 수 있습니다. 농업인 등록신청서는 53개 필드, 7개 그룹(색상 구분)으로 미리 설정되어 있습니다." data-en="Pre-made templates are available. Use them from the dashboard or click 'Edit' to adjust bounding box positions. The agriculture form has 53 fields in 7 color-coded groups."></p>
  <div class="info-box warn"><strong data-ko="새 양식이 필요한 경우" data-en="Need a new form type?"></strong><br><span data-ko="상단 메뉴의 '편집기'를 클릭하면 PDF를 업로드하고 새 바운딩 박스를 그릴 수 있습니다." data-en="Click 'Editor' in the top menu to upload a PDF and draw new bounding boxes."></span></div>
</div>

<div class="sec" id="single">
  <div class="sec-num" data-ko="03 / 단건 스캔" data-en="03 / SINGLE SCAN"></div>
  <h2 data-ko="문서 1장 스캔하기" data-en="Scanning a Single Document"></h2>
  <p class="desc" data-ko="PDF 문서 1장을 스캔하는 방법입니다." data-en="How to scan one PDF document."></p>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h3 data-ko="'PDF 업로드 + OCR' 탭을 클릭합니다" data-en="Click the 'PDF Upload + OCR' tab"></h3><p data-ko="대시보드 중간의 첫 번째 탭입니다." data-en="It's the first tab on the dashboard."></p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h3 data-ko="템플릿을 선택합니다" data-en="Select a template"></h3><p data-ko="드롭다운에서 문서 양식에 맞는 템플릿을 고르세요." data-en="Choose the template that matches your document form."></p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h3 data-ko="PDF 파일을 업로드합니다" data-en="Upload your PDF file"></h3><p data-ko="점선 박스 안에 파일을 끌어다 놓거나, 박스를 클릭하여 선택하세요." data-en="Drag and drop into the dashed box, or click to browse."></p></div></div>
    <div class="step"><div class="step-num" style="background:var(--g)">4</div><div class="step-body"><h3 data-ko="초록색 'OCR 실행' 버튼을 클릭합니다" data-en="Click the green 'OCR Run' button"></h3><p data-ko="시스템이 문서를 분석합니다. 잠시 기다려주세요." data-en="The system will analyze your document. Please wait."></p></div></div>
    <div class="step"><div class="step-num">5</div><div class="step-body"><h3 data-ko="'검수 페이지로 이동'을 클릭합니다" data-en="Click 'Go to Review Page'"></h3><p data-ko="완료 후 파란색 버튼이 나타납니다." data-en="A blue button appears after processing completes."></p></div></div>
  </div>
</div>

<div class="sec" id="batch">
  <div class="sec-num" data-ko="04 / 배치 스캔" data-en="04 / BATCH SCAN"></div>
  <h2 data-ko="여러 문서 한번에 스캔하기" data-en="Scanning Multiple Documents"></h2>
  <p class="desc" data-ko="같은 양식의 문서가 여러 장일 때 사용합니다." data-en="Use when you have many documents of the same form type."></p>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h3 data-ko="'배치 처리' 탭을 클릭합니다" data-en="Click the 'Batch Processing' tab"></h3><p data-ko="세 번째 탭입니다." data-en="It's the third tab."></p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h3 data-ko="템플릿 선택 후 PDF 여러 장을 업로드합니다" data-en="Select template, then upload multiple PDFs"></h3><p data-ko="Ctrl 키를 누른 채 여러 파일을 클릭하면 한번에 선택됩니다." data-en="Hold Ctrl and click multiple files to select them all."></p></div></div>
    <div class="step"><div class="step-num" style="background:var(--g)">3</div><div class="step-body"><h3 data-ko="'일괄 OCR 실행' 버튼을 클릭합니다" data-en="Click 'Batch OCR Run'"></h3><p data-ko="모든 문서가 순서대로 처리됩니다." data-en="All documents will be processed in order."></p></div></div>
  </div>
</div>

<div class="sec" id="review">
  <div class="sec-num" data-ko="05 / 결과 검수" data-en="05 / REVIEW"></div>
  <h2 data-ko="결과 검수하기" data-en="Reviewing Results"></h2>
  <p class="desc" data-ko="OCR이 읽어낸 결과를 확인하고 잘못된 부분을 수정합니다." data-en="Verify OCR results and fix any mistakes."></p>
  <div class="info-box"><strong data-ko="화면 구성" data-en="Screen Layout"></strong><br><span data-ko="왼쪽(40%)에 원본 문서, 오른쪽(60%)에 수정 패널이 표시됩니다. 문서 위에 그룹별 색상 박스(7색)로 필드 위치가 표시됩니다. 박스를 드래그하면 위치 이동, 우하단 핸들을 드래그하면 크기 조정이 가능합니다." data-en="Left (40%) shows the document, right (60%) shows the edit panel. Fields are shown as color-coded boxes (7 colors by group). Drag a box to move it, drag the bottom-right handle to resize. Changes are saved automatically."></span></div>

  <h3 style="margin:20px 0 12px" data-ko="색상의 의미" data-en="Color Guide"></h3>
  <div class="color-row">
    <div class="color-item"><div class="color-dot" style="background:var(--g)"></div><span data-ko="초록 = 정확함 (확인 불필요)" data-en="Green = Correct"></span></div>
    <div class="color-item"><div class="color-dot" style="background:var(--o)"></div><span data-ko="주황 = 확인 필요" data-en="Orange = Needs checking"></span></div>
    <div class="color-item"><div class="color-dot" style="background:var(--r)"></div><span data-ko="빨강 = 오류 (반드시 수정)" data-en="Red = Error (must fix)"></span></div>
  </div>

  <h3 style="margin:20px 0 12px" data-ko="수정 방법" data-en="How to Fix"></h3>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h3 data-ko="가장 의심스러운 필드부터 자동으로 보여줍니다" data-en="Most uncertain fields are shown first"></h3><p data-ko="확대된 이미지를 보고 OCR 결과가 맞는지 확인하세요." data-en="Check the zoomed image and verify the OCR result."></p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h3 data-ko="맞으면 Enter, 틀리면 수정 후 Enter" data-en="Enter if correct, type fix then Enter"></h3><p data-ko="자동으로 다음 필드로 이동합니다." data-en="Automatically moves to the next field."></p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h3 data-ko="모르겠으면 Esc로 건너뛰세요" data-en="Press Esc to skip if unsure"></h3><p data-ko="나중에 돌아와서 수정할 수 있습니다." data-en="You can come back later."></p></div></div>
  </div>

  <h3 style="margin:24px 0 12px" data-ko="빠른 수정 도구" data-en="Quick Fix Tools"></h3>
  <table>
    <thead><tr><th data-ko="버튼" data-en="Button"></th><th data-ko="기능" data-en="Function"></th><th data-ko="예시" data-en="Example"></th></tr></thead>
    <tbody>
      <tr><td data-ko="공백제거" data-en="Trim"></td><td data-ko="앞뒤 빈칸 제거" data-en="Remove spaces"></td><td>" 홍길동 " -> "홍길동"</td></tr>
      <tr><td data-ko="특수문자" data-en="Special"></td><td data-ko="특수문자 제거" data-en="Remove special chars"></td><td>"홍길동!" -> "홍길동"</td></tr>
      <tr><td data-ko="하이픈" data-en="Hyphen"></td><td data-ko="주민번호에 - 추가" data-en="Add hyphen to ID"></td><td>"1234561234567" -> "123456-1234567"</td></tr>
      <tr><td data-ko="비우기" data-en="Clear"></td><td data-ko="내용 삭제" data-en="Empty the field"></td><td></td></tr>
    </tbody>
  </table>
  <div class="info-box" style="margin-top:20px"><strong data-ko="일괄 확인" data-en="Bulk Confirm"></strong><br><span data-ko="'일괄 확인' 버튼으로 신뢰도 80% 이상 필드를 한번에 확인합니다. 검수 시간이 크게 줄어듭니다." data-en="The 'Bulk Confirm' button approves all fields with 80%+ confidence at once, greatly reducing review time."></span></div>
</div>

<div class="sec" id="keys">
  <div class="sec-num" data-ko="06 / 단축키" data-en="06 / SHORTCUTS"></div>
  <h2 data-ko="키보드 단축키" data-en="Keyboard Shortcuts"></h2>
  <p class="desc" data-ko="? 키를 누르면 도움말이 나타납니다." data-en="Press ? to see the help overlay."></p>
  <div class="key-grid">
    <div class="key-item"><kbd>Enter</kbd><span data-ko="확인 + 다음으로" data-en="Confirm + Next"></span></div>
    <div class="key-item"><kbd>Esc</kbd><span data-ko="건너뛰기" data-en="Skip"></span></div>
    <div class="key-item"><kbd>Tab</kbd><span data-ko="다음 문제 필드" data-en="Next problem"></span></div>
    <div class="key-item"><kbd>Shift+Tab</kbd><span data-ko="이전 필드" data-en="Previous field"></span></div>
    <div class="key-item"><kbd>Ctrl+Z</kbd><span data-ko="되돌리기" data-en="Undo"></span></div>
    <div class="key-item"><kbd>?</kbd><span data-ko="도움말" data-en="Help"></span></div>
    <div class="key-item"><kbd>Ctrl+D</kbd><span data-ko="통계 보기" data-en="Statistics"></span></div>
    <div class="key-item"><kbd>Ctrl+E</kbd><span data-ko="엑셀 내보내기" data-en="Export Excel"></span></div>
  </div>
</div>

<div class="sec" id="export">
  <div class="sec-num" data-ko="07 / 내보내기" data-en="07 / EXPORT"></div>
  <h2 data-ko="결과 내보내기" data-en="Exporting Results"></h2>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h3 data-ko="'엑셀 내보내기' 버튼 클릭 (또는 Ctrl+E)" data-en="Click 'Export Excel' (or Ctrl+E)"></h3><p data-ko="검수 화면 상단 오른쪽에 있습니다." data-en="Located in the top-right of the review screen."></p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h3 data-ko="엑셀 파일이 생성됩니다" data-en="Excel file is generated"></h3><p data-ko="4개 시트: 신청인 정보, 가족관계, 검수 항목, 원본 결과. 셀 색상으로 상태 구분 (초록=정상, 노랑=확인, 빨강=오류)." data-en="4 sheets: applicant info, family, review items, raw results. Cell colors show status (green=ok, yellow=check, red=error)."></p></div></div>
  </div>
  <h3 style="margin:24px 0 12px" data-ko="데이터 공유" data-en="Sharing Data"></h3>
  <p data-ko="'동기화' 버튼으로 수정 데이터를 다운로드하여 팀원에게 공유할 수 있습니다." data-en="Click 'Sync' to download correction data and share it with your team."></p>
</div>

<div class="sec" id="faq">
  <div class="sec-num" data-ko="08 / FAQ" data-en="08 / FAQ"></div>
  <h2 data-ko="자주 묻는 질문" data-en="Frequently Asked Questions"></h2>
  <details><summary data-ko="검수 화면에 문서가 없어요" data-en="No documents on review screen"></summary><div class="answer" data-ko="OCR을 먼저 실행해야 합니다. 대시보드에서 PDF를 업로드하고 'OCR 실행'을 클릭하세요." data-en="Run OCR first. Upload a PDF on the dashboard and click 'OCR Run'."></div></details>
  <details><summary data-ko="OCR 결과가 많이 틀려요" data-en="OCR results are inaccurate"></summary><div class="answer" data-ko="스캔 품질이 낮으면 인식률이 떨어집니다. 선명한 PDF를 사용하고 올바른 템플릿을 선택했는지 확인하세요." data-en="Low scan quality reduces accuracy. Use clear PDFs and verify the correct template is selected."></div></details>
  <details><summary data-ko="엑셀 내보내기가 안 돼요" data-en="Excel export fails"></summary><div class="answer" data-ko="검수 완료된 문서가 최소 1개 있어야 합니다." data-en="You need at least 1 reviewed document."></div></details>
  <details><summary data-ko="새로고침하면 작업이 사라지나요?" data-en="Does refreshing lose my work?"></summary><div class="answer" data-ko="아닙니다. 모든 수정은 즉시 저장됩니다. 새로고침해도 마지막 위치로 복원됩니다." data-en="No. All edits are saved instantly. You'll return to your last position."></div></details>
  <details><summary data-ko="다른 사람과 동시에 작업할 수 있나요?" data-en="Can multiple people work simultaneously?"></summary><div class="answer" data-ko="네. 각 사용자의 작업은 ID별로 분리됩니다. '동기화'로 수정 데이터를 공유하세요." data-en="Yes. Each user's work is separated by ID. Use 'Sync' to share corrections."></div></details>
</div>

<script>
let lang=localStorage.getItem('guide-lang')||'ko';
function applyLang(){document.querySelectorAll('[data-ko]').forEach(el=>{el.textContent=el.dataset[lang]});document.getElementById('langBtn').textContent=lang==='ko'?'English':'한국어';document.documentElement.lang=lang;localStorage.setItem('guide-lang',lang)}
function toggleLang(){lang=lang==='ko'?'en':'ko';applyLang()}
const secs=document.querySelectorAll('.sec[id]'),navAs=document.querySelectorAll('.topbar .nav-links a');
window.addEventListener('scroll',()=>{let c='';secs.forEach(s=>{if(scrollY>=s.offsetTop-80)c=s.id});navAs.forEach(a=>{const h=a.getAttribute('href');a.style.color=h==='#'+c?'var(--tx)':'';a.style.background=h==='#'+c?'var(--c)':''})});
applyLang();
</script>
