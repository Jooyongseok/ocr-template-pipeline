<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 템플릿 편집기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #09090b; color: #fafafa; }
.global-nav { background: #18181b; border-bottom: 1px solid #3f3f46; padding: 0 24px; display: flex; align-items: center; height: 40px; gap: 16px; }
.global-nav .logo { font-size: 15px; font-weight: 700; color: #818cf8; margin-right: 12px; }
.global-nav a { color: #a1a1aa; text-decoration: none; font-size: 13px; padding: 4px 12px; border-radius: 5px; }
.global-nav a:hover { color: #fafafa; background: #27272a; }
.global-nav a.on { color: #fafafa; background: #27272a; }
.header { background: #18181b; color: #fafafa; padding: 8px 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #3f3f46; }
.header h1 { font-size: 16px; color: #818cf8; }
.header .meta { display: flex; gap: 10px; align-items: center; }
.header input, .header select { padding: 4px 8px; border: 1px solid #3f3f46; border-radius: 5px; font-size: 13px; background: #27272a; color: #fafafa; }
.header input { width: 280px; }
.main { display: flex; height: calc(100vh - 86px); }

/* 캔버스 영역 */
.canvas-area { flex: 1; overflow: auto; padding: 10px; background: #0c0c10; position: relative; }
.canvas-wrap { position: relative; display: inline-block; cursor: crosshair; }
.canvas-wrap img { display: block; user-select: none; -webkit-user-drag: none; }
.canvas-wrap canvas { position: absolute; top: 0; left: 0; }

/* 사이드바 */
.sidebar { width: 380px; background: #18181b; border-left: 1px solid #3f3f46; display: flex; flex-direction: column; }
.sidebar-header { padding: 10px; background: #27272a; border-bottom: 1px solid #3f3f46; display: flex; gap: 8px; flex-wrap: wrap; }
.sidebar-header button { padding: 5px 10px; font-size: 12px; cursor: pointer; border: 1px solid #3f3f46; border-radius: 5px; background: #27272a; color: #fafafa; }
.sidebar-header button:hover { background: #3f3f46; }
.sidebar-header button.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
.sidebar-header button.primary:hover { background: #4f46e5; }
.sidebar-header button.danger { background: #ef4444; color: #fff; border-color: #ef4444; }

.field-list { flex: 1; overflow-y: auto; padding: 8px; }
.field-card { border: 2px solid #3f3f46; border-radius: 8px; margin-bottom: 8px; padding: 8px; font-size: 12px; cursor: pointer; transition: border-color 0.15s; background: #27272a; }
.field-card.selected { border-color: #6366f1; background: #1e1b4b; }
.field-card .row { display: flex; gap: 6px; margin-bottom: 4px; align-items: center; }
.field-card label { font-size: 11px; color: #a1a1aa; min-width: 50px; }
.field-card input, .field-card select { flex: 1; padding: 3px 5px; font-size: 12px; border: 1px solid #3f3f46; border-radius: 4px; background: #18181b; color: #fafafa; }
.field-card .field-num { font-weight: bold; font-size: 13px; color: #818cf8; }
.field-card .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
.field-card .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 0 4px; }

/* 하단 상태바 */
.statusbar { background: #18181b; color: #a1a1aa; padding: 4px 12px; font-size: 11px; display: flex; justify-content: space-between; border-top: 1px solid #3f3f46; }

/* 모달 */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #18181b; border: 1px solid #3f3f46; border-radius: 12px; padding: 20px; min-width: 400px; max-height: 80vh; overflow-y: auto; color: #fafafa; }
.modal h3 { margin-bottom: 12px; color: #818cf8; }
.modal .template-item { padding: 8px; border: 1px solid #3f3f46; border-radius: 6px; margin-bottom: 6px; cursor: pointer; background: #27272a; }
.modal .template-item:hover { background: #3f3f46; border-color: #6366f1; }

/* 업로드 안내 */
.upload-guide { display: flex; justify-content: center; align-items: center; height: 100%; color: #a1a1aa; font-size: 16px; }
</style>
</head>
<body>

<div class="global-nav">
  <span class="logo">OCR Pipeline</span>
  <a href="/">대시보드</a>
  <a href="/review">검수하기</a>
  <a href="/editor" class="on">편집기</a>
</div>

<div class="header">
  <h1>OCR 템플릿 편집기</h1>
  <div class="meta">
    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg">
    <select id="pageSelect" style="display:none;"></select>
    <input id="templateId" placeholder="template_id" value="basic_direct_payment_farmer_page1_v1">
    <input id="docName" placeholder="문서 이름" value="기본직접지불금 지급대상자 등록신청서_농업인용">
  </div>
</div>

<div class="main">
  <div class="canvas-area" id="canvasArea">
    <div class="upload-guide" id="uploadGuide">PDF 또는 이미지 파일을 업로드하세요</div>
    <div class="canvas-wrap" id="canvasWrap" style="display:none;">
      <img id="docImage" draggable="false">
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <button onclick="showTemplateModal()" style="font-weight:600">불러오기</button>
      <button class="primary" onclick="addPresetField()">+ 프리셋</button>
      <button class="primary" onclick="saveTemplate()">저장</button>
      <button onclick="exportJSON()">다운로드</button>
      <button class="danger" onclick="clearAll()">초기화</button>
    </div>
    <div class="field-list" id="fieldList"></div>
  </div>
</div>

<div class="statusbar">
  <span id="statusCoord">좌표: -</span>
  <span id="statusInfo">필드: 0개</span>
</div>

<!-- 프리셋 선택 모달 -->
<div class="modal-overlay" id="presetModal">
  <div class="modal">
    <h3>프리셋 필드 선택</h3>
    <div style="margin-bottom:10px;">
      <input id="presetSearch" placeholder="검색..." style="width:100%;padding:6px;font-size:13px;border:1px solid #ccc;border-radius:3px;">
    </div>
    <div id="presetList" style="max-height:50vh;overflow-y:auto;"></div>
    <div style="margin-top:10px;text-align:right;">
      <button onclick="closePresetModal()">닫기</button>
    </div>
  </div>
</div>

<!-- 템플릿 불러오기 모달 -->
<div class="modal-overlay" id="templateModal">
  <div class="modal">
    <h3>저장된 템플릿 불러오기</h3>
    <div id="templateList"></div>
    <div style="margin-top:10px;text-align:right;">
      <button onclick="closeTemplateModal()">닫기</button>
    </div>
  </div>
</div>

<script>
// ---- 상태 ----
let fields = [];          // [{key, label, field_type, group, required, bbox_norm:[x,y,w,h]}]
let selectedIdx = -1;
let presets = {};
let fieldTypes = [];
let groups = [];
let groupColors = {};
let excelSheetMap = {};

let imgW = 0, imgH = 0;  // 표시된 이미지 크기
let origW = 0, origH = 0;

// 드로잉 상태
let isDrawing = false;
let drawStart = null;
let dragMode = null;  // null | 'draw' | 'move' | 'resize'
let dragOffset = {x:0, y:0};
let resizeHandle = null;

const HANDLE_SIZE = 6;

// ---- DOM ----
const docImage = document.getElementById('docImage');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');
const uploadGuide = document.getElementById('uploadGuide');
const fieldList = document.getElementById('fieldList');

// ---- 초기화 ----
fetch('/editor/presets').then(r => r.json()).then(data => {
  presets = data.presets;
  fieldTypes = data.field_types;
  groups = data.groups;
  groupColors = data.group_colors;
  excelSheetMap = data.excel_sheet_map || {};
});

// ---- 파일 업로드 ----
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  await uploadFile(file, 1);
});

async function uploadFile(file, page) {
  const form = new FormData();
  form.append('file', file);
  form.append('page', page);
  const res = await fetch('/editor/upload', {method:'POST', body: form});
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  // 페이지 선택기
  if (data.total_pages > 1) {
    const sel = document.getElementById('pageSelect');
    sel.style.display = '';
    sel.innerHTML = '';
    for (let i = 1; i <= data.total_pages; i++) {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = `${i}페이지`;
      if (i === page) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.onchange = () => uploadFile(file, parseInt(sel.value));
  }

  docImage.onload = () => {
    imgW = docImage.naturalWidth;
    imgH = docImage.naturalHeight;
    // 화면에 맞게 스케일
    const maxW = document.getElementById('canvasArea').clientWidth - 30;
    const scale = Math.min(1, maxW / imgW);
    const dispW = Math.floor(imgW * scale);
    const dispH = Math.floor(imgH * scale);
    docImage.style.width = dispW + 'px';
    docImage.style.height = dispH + 'px';
    overlay.width = dispW;
    overlay.height = dispH;
    origW = imgW;
    origH = imgH;
    imgW = dispW;
    imgH = dispH;
    uploadGuide.style.display = 'none';
    canvasWrap.style.display = '';
    redraw();
  };
  docImage.src = data.image;
}

// ---- 캔버스 이벤트 ----
overlay.addEventListener('mousedown', (e) => {
  const rect = overlay.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // 리사이즈 핸들 체크
  if (selectedIdx >= 0) {
    const handle = hitHandle(selectedIdx, x, y);
    if (handle) {
      dragMode = 'resize';
      resizeHandle = handle;
      e.preventDefault();
      return;
    }
  }

  // 기존 박스 클릭 체크
  const hitIdx = hitTest(x, y);
  if (hitIdx >= 0) {
    selectedIdx = hitIdx;
    dragMode = 'move';
    const b = bboxToPixel(fields[hitIdx].bbox_norm);
    dragOffset = {x: x - b.x, y: y - b.y};
    renderFieldList();
    redraw();
    e.preventDefault();
    return;
  }

  // 새 박스 그리기
  dragMode = 'draw';
  drawStart = {x, y};
  e.preventDefault();
});

overlay.addEventListener('mousemove', (e) => {
  const rect = overlay.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // 상태바 좌표
  const nx = (x / imgW).toFixed(4);
  const ny = (y / imgH).toFixed(4);
  document.getElementById('statusCoord').textContent = `좌표: (${nx}, ${ny}) px:(${Math.round(x)}, ${Math.round(y)})`;

  // 커서
  if (selectedIdx >= 0 && hitHandle(selectedIdx, x, y)) {
    overlay.style.cursor = 'nwse-resize';
  } else if (hitTest(x, y) >= 0) {
    overlay.style.cursor = 'move';
  } else {
    overlay.style.cursor = 'crosshair';
  }

  if (dragMode === 'draw' && drawStart) {
    redraw();
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(drawStart.x, drawStart.y, x - drawStart.x, y - drawStart.y);
    ctx.setLineDash([]);
  } else if (dragMode === 'move' && selectedIdx >= 0) {
    const b = bboxToPixel(fields[selectedIdx].bbox_norm);
    const newX = Math.max(0, Math.min(imgW - b.w, x - dragOffset.x));
    const newY = Math.max(0, Math.min(imgH - b.h, y - dragOffset.y));
    fields[selectedIdx].bbox_norm = [newX / imgW, newY / imgH, b.w / imgW, b.h / imgH].map(v => round4(v));
    redraw();
  } else if (dragMode === 'resize' && selectedIdx >= 0) {
    const f = fields[selectedIdx];
    const b = bboxToPixel(f.bbox_norm);
    if (resizeHandle === 'br') {
      const nw = Math.max(10, x - b.x);
      const nh = Math.max(10, y - b.y);
      f.bbox_norm = [b.x / imgW, b.y / imgH, nw / imgW, nh / imgH].map(v => round4(v));
    } else if (resizeHandle === 'tl') {
      const nw = Math.max(10, (b.x + b.w) - x);
      const nh = Math.max(10, (b.y + b.h) - y);
      f.bbox_norm = [x / imgW, y / imgH, nw / imgW, nh / imgH].map(v => round4(v));
    }
    redraw();
  }
});

overlay.addEventListener('mouseup', (e) => {
  if (dragMode === 'draw' && drawStart) {
    const rect = overlay.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const bx = Math.min(drawStart.x, x);
    const by = Math.min(drawStart.y, y);
    const bw = Math.abs(x - drawStart.x);
    const bh = Math.abs(y - drawStart.y);
    if (bw > 5 && bh > 5) {
      const bbox_norm = [bx / imgW, by / imgH, bw / imgW, bh / imgH].map(v => round4(v));
      fields.push({
        key: '', label: '', field_type: 'text', group: 'applicant', required: false,
        bbox_norm
      });
      selectedIdx = fields.length - 1;
      renderFieldList();
    }
  }
  dragMode = null;
  drawStart = null;
  resizeHandle = null;
  redraw();
});

// 키보드 삭제
document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' && selectedIdx >= 0) {
    // 입력 필드에 포커스가 있으면 무시
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
    fields.splice(selectedIdx, 1);
    selectedIdx = -1;
    renderFieldList();
    redraw();
  }
});

// ---- 그리기 ----
function redraw() {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  fields.forEach((f, i) => {
    const b = bboxToPixel(f.bbox_norm);
    const color = groupColors[f.group] || '#999';
    const alpha = (i === selectedIdx) ? 0.18 : 0.08;

    ctx.fillStyle = hexToRgba(color, alpha);
    ctx.fillRect(b.x, b.y, b.w, b.h);

    ctx.strokeStyle = color;
    ctx.lineWidth = (i === selectedIdx) ? 3 : 1.5;
    ctx.strokeRect(b.x, b.y, b.w, b.h);

    // 라벨
    const label = f.key || `필드${i+1}`;
    ctx.font = '11px sans-serif';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = color;
    ctx.fillRect(b.x, b.y - 15, tw + 6, 15);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, b.x + 3, b.y - 4);

    // 선택된 박스 핸들
    if (i === selectedIdx) {
      drawHandle(b.x, b.y);
      drawHandle(b.x + b.w, b.y + b.h);
    }
  });
  document.getElementById('statusInfo').textContent = `필드: ${fields.length}개`;
}

function drawHandle(x, y) {
  ctx.fillStyle = '#2980b9';
  ctx.fillRect(x - HANDLE_SIZE/2, y - HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
}

// ---- 유틸 ----
function bboxToPixel(norm) {
  return {x: norm[0]*imgW, y: norm[1]*imgH, w: norm[2]*imgW, h: norm[3]*imgH};
}
function round4(v) { return Math.round(v * 10000) / 10000; }
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function hitTest(x, y) {
  for (let i = fields.length - 1; i >= 0; i--) {
    const b = bboxToPixel(fields[i].bbox_norm);
    if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) return i;
  }
  return -1;
}

function hitHandle(idx, x, y) {
  const b = bboxToPixel(fields[idx].bbox_norm);
  const hs = HANDLE_SIZE + 4;
  if (Math.abs(x - (b.x+b.w)) < hs && Math.abs(y - (b.y+b.h)) < hs) return 'br';
  if (Math.abs(x - b.x) < hs && Math.abs(y - b.y) < hs) return 'tl';
  return null;
}

// ---- 필드 리스트 ----
function renderFieldList() {
  fieldList.innerHTML = '';
  fields.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'field-card' + (i === selectedIdx ? ' selected' : '');
    card.style.borderLeftColor = groupColors[f.group] || '#999';
    card.style.borderLeftWidth = '4px';
    card.onclick = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
      selectedIdx = i;
      renderFieldList();
      redraw();
    };

    card.innerHTML = `
      <div class="row">
        <span class="field-num">#${i+1}</span>
        <span class="color-dot" style="background:${groupColors[f.group]||'#999'}"></span>
        <span style="flex:1;font-weight:bold;">${f.key || '미지정'}</span>
        <button class="delete-btn" onclick="deleteField(${i})" title="삭제">✕</button>
      </div>
      <div class="row">
        <label>key</label>
        <input value="${esc(f.key)}" onchange="updateField(${i},'key',this.value)" placeholder="field_key">
        <button style="font-size:11px;padding:2px 6px;cursor:pointer;" onclick="openPresetFor(${i})" title="프리셋 선택">📋</button>
      </div>
      <div class="row">
        <label>라벨</label>
        <input value="${esc(f.label)}" onchange="updateField(${i},'label',this.value)" placeholder="라벨">
      </div>
      <div class="row">
        <label>타입</label>
        <select onchange="updateField(${i},'field_type',this.value)">
          ${fieldTypes.map(t => `<option value="${t}" ${f.field_type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="row">
        <label>그룹</label>
        <select onchange="updateField(${i},'group',this.value);renderFieldList();redraw();">
          ${groups.map(g => `<option value="${g}" ${f.group===g?'selected':''}>${g}</option>`).join('')}
        </select>
        <label style="min-width:auto;"><input type="checkbox" ${f.required?'checked':''} onchange="updateField(${i},'required',this.checked)"> 필수</label>
      </div>
      <div class="row" style="color:#888;font-size:10px;">
        bbox: [${f.bbox_norm.join(', ')}]
      </div>
    `;
    fieldList.appendChild(card);
  });

  // 선택된 필드가 보이게 스크롤
  if (selectedIdx >= 0) {
    const cards = fieldList.querySelectorAll('.field-card');
    if (cards[selectedIdx]) cards[selectedIdx].scrollIntoView({block:'nearest'});
  }
}

function esc(s) { return (s||'').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function updateField(i, key, val) {
  fields[i][key] = val;
  if (key === 'group') redraw();
}

function deleteField(i) {
  fields.splice(i, 1);
  if (selectedIdx === i) selectedIdx = -1;
  else if (selectedIdx > i) selectedIdx--;
  renderFieldList();
  redraw();
}

function clearAll() {
  if (!confirm('모든 필드를 삭제하시겠습니까?')) return;
  fields = [];
  selectedIdx = -1;
  renderFieldList();
  redraw();
}

// ---- 프리셋 ----
let presetTargetIdx = -1;  // -1이면 새 필드, 0+이면 기존 필드에 적용

function addPresetField() {
  presetTargetIdx = -1;
  showPresetModal();
}

function openPresetFor(i) {
  presetTargetIdx = i;
  showPresetModal();
}

function showPresetModal() {
  document.getElementById('presetModal').classList.add('show');
  document.getElementById('presetSearch').value = '';
  renderPresetList('');
  document.getElementById('presetSearch').focus();
  document.getElementById('presetSearch').oninput = (e) => renderPresetList(e.target.value);
}

function closePresetModal() {
  document.getElementById('presetModal').classList.remove('show');
}

function renderPresetList(filter) {
  const container = document.getElementById('presetList');
  container.innerHTML = '';
  const fl = filter.toLowerCase();
  // 이미 사용된 키
  const usedKeys = new Set(fields.map(f => f.key));

  Object.entries(presets).forEach(([key, p]) => {
    if (fl && !key.includes(fl) && !p.label.includes(fl)) return;
    const used = usedKeys.has(key);
    const div = document.createElement('div');
    div.className = 'template-item';
    if (used) div.style.opacity = '0.4';
    div.innerHTML = `
      <strong>${key}</strong> <span style="color:#888;font-size:12px;">${p.label}</span>
      <br><span style="font-size:11px;color:${groupColors[p.group]||'#999'}">${p.group}</span>
      · <span style="font-size:11px;">${p.field_type}</span>
      ${p.required ? '· <span style="color:#e74c3c;font-size:11px;">필수</span>' : ''}
      ${used ? ' · <span style="color:#888;font-size:11px;">이미 추가됨</span>' : ''}
    `;
    div.onclick = () => applyPreset(key, p);
    container.appendChild(div);
  });
}

function applyPreset(key, p) {
  if (presetTargetIdx >= 0) {
    // 기존 필드에 적용
    const f = fields[presetTargetIdx];
    f.key = key;
    f.label = p.label;
    f.field_type = p.field_type;
    f.group = p.group;
    f.required = p.required;
  } else {
    // 새 필드 (박스 없이 추가 - 나중에 캔버스에서 그려야 함)
    fields.push({
      key, label: p.label, field_type: p.field_type, group: p.group,
      required: p.required,
      bbox_norm: [0.1, 0.1 + fields.length * 0.04, 0.15, 0.03]  // 임시 위치
    });
    selectedIdx = fields.length - 1;
  }
  closePresetModal();
  renderFieldList();
  redraw();
}

// ---- 템플릿 저장/불러오기 ----
function buildTemplateJSON() {
  return {
    template_id: document.getElementById('templateId').value,
    document_name: document.getElementById('docName').value,
    page_scope: [parseInt(document.getElementById('pageSelect')?.value || 1)],
    coordinate_system: "normalized",
    page_width: origW,
    page_height: origH,
    fields: fields.map(f => ({
      key: f.key,
      label: f.label,
      page: parseInt(document.getElementById('pageSelect')?.value || 1),
      group: f.group,
      field_type: f.field_type,
      required: f.required,
      bbox_norm: f.bbox_norm,
      excel_sheet: excelSheetMap[f.group] || 'applicants',
      excel_column: f.label,
    }))
  };
}

async function saveTemplate() {
  const template = buildTemplateJSON();
  if (!template.template_id) { alert('template_id를 입력하세요'); return; }
  if (fields.length === 0) { alert('필드가 없습니다'); return; }

  const res = await fetch('/editor/save-template', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(template)
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  alert('저장 완료: ' + data.saved);
}

function exportJSON() {
  const template = buildTemplateJSON();
  const blob = new Blob([JSON.stringify(template, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (template.template_id || 'template') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function showTemplateModal() {
  document.getElementById('templateModal').classList.add('show');
  const res = await fetch('/editor/templates');
  const data = await res.json();
  const container = document.getElementById('templateList');
  container.innerHTML = '';
  if (data.templates.length === 0) {
    container.innerHTML = '<p style="color:#888;">저장된 템플릿이 없습니다.</p>';
    return;
  }
  data.templates.forEach(t => {
    const div = document.createElement('div');
    div.className = 'template-item';
    div.innerHTML = `<strong>${t.template_id}</strong> <span style="color:#888;">${t.document_name}</span><br>
      <span style="font-size:11px;">${t.field_count}개 필드 · ${t.filename}</span>`;
    div.onclick = () => loadTemplate(t.filename);
    container.appendChild(div);
  });
}

function closeTemplateModal() {
  document.getElementById('templateModal').classList.remove('show');
}

async function loadTemplate(filename) {
  const res = await fetch('/editor/load-template', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({filename})
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  const t = data.template;
  document.getElementById('templateId').value = t.template_id || '';
  document.getElementById('docName').value = t.document_name || '';

  // Load group colors from template if defined
  if (t.groups) {
    Object.entries(t.groups).forEach(([gname, gdata]) => {
      if (gdata.color) groupColors[gname] = gdata.color;
      if (!groups.includes(gname)) groups.push(gname);
    });
  }

  fields = (t.fields || []).map(f => ({
    key: f.key,
    label: f.label,
    field_type: f.field_type,
    group: f.group,
    required: f.required,
    bbox_norm: f.bbox_norm,
  }));
  selectedIdx = -1;
  closeTemplateModal();
  renderFieldList();
  redraw();
}

// URL ?template= 파라미터로 자동 로드
(async function autoLoad() {
  const params = new URLSearchParams(window.location.search);
  const tpl = params.get('template');
  if (tpl) {
    await loadTemplate(tpl);

    // input/ 폴더에서 첫 PDF를 자동으로 로드하여 배경 이미지로 표시
    try {
      const pdfData = await fetch('/editor/load-pdf-from-input', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({filename: '', page: 1})
      }).then(r => r.json());

      if (pdfData.image) {
        const img = document.getElementById('docImage');
        img.onload = function() {
          const canvas = document.getElementById('overlay');
          // 화면에 맞게 스케일
          const maxW = document.getElementById('canvasArea').clientWidth - 30;
          const scale = Math.min(1, maxW / img.naturalWidth);
          const dispW = Math.floor(img.naturalWidth * scale);
          const dispH = Math.floor(img.naturalHeight * scale);
          img.style.width = dispW + 'px';
          img.style.height = dispH + 'px';
          canvas.width = dispW;
          canvas.height = dispH;
          origW = img.naturalWidth;
          origH = img.naturalHeight;
          imgW = dispW;
          imgH = dispH;
          document.getElementById('canvasWrap').style.display = 'inline-block';
          document.getElementById('uploadGuide').style.display = 'none';
          redraw();
        };
        img.src = pdfData.image;
        document.getElementById('statusInfo').textContent =
          '필드: ' + fields.length + '개 | PDF: ' + pdfData.filename;
      }
    } catch(e) {
      // PDF 로드 실패시 안내만 표시
      const pdfsRes = await fetch('/api/input-pdfs').then(r=>r.json()).catch(()=>({pdfs:[]}));
      document.getElementById('uploadGuide').innerHTML =
        '<div style="text-align:center">' +
        '<p>템플릿 로드 완료 (' + fields.length + '개 필드)</p>' +
        '<p style="color:#818cf8;margin-top:8px">바운딩 박스를 보려면 위에서 PDF를 업로드하세요</p>' +
        '</div>';
    }
  }
})();

// 초기 렌더
renderFieldList();
</script>
