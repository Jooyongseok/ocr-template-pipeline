<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 검수 시스템</title>
<link rel="stylesheet" href="/static/review.css">
</head>
<body>
<!-- ── 상단 바 ── -->
<header id="header">
  <div class="header-left">
    <h1>OCR 검수</h1>
    <span id="batch-progress" class="progress-badge">-- / -- 문서</span>
    <div class="progress-bar-outer small">
      <div id="batch-progress-bar" class="progress-bar-inner" style="width:0%"></div>
    </div>
  </div>
  <div class="header-center">
    <button id="btn-prev-doc" title="이전 문서">&lt; 이전</button>
    <span id="current-doc-label">문서 선택...</span>
    <button id="btn-next-doc" title="다음 문서">다음 &gt;</button>
    <select id="filter-status">
      <option value="all">전체</option>
      <option value="review" selected>문제만</option>
      <option value="ok">완료</option>
    </select>
  </div>
  <div class="header-right">
    <button id="btn-skip-doc" class="btn-danger" title="이 문서 건너뛰기">건너뛰기</button>
    <button id="btn-export" class="btn-primary">엑셀 내보내기</button>
    <span id="al-badge" class="al-badge" title="Active Learning 수집 건수">AL: 0</span>
  </div>
</header>

<!-- ── 메인 ── -->
<main id="main">
  <!-- 왼쪽: 문서 이미지 + 필드 목록 (40%) -->
  <section id="left-panel">
    <div id="image-container">
      <img id="page-image" src="" alt="문서 이미지">
      <div id="field-overlays"></div>
    </div>
    <div id="field-list">
      <h3>필드 목록</h3>
      <ul id="field-list-items"></ul>
    </div>
  </section>

  <!-- 오른쪽: 검수 패널 (60%) -->
  <section id="right-panel">
    <div id="empty-state" class="empty-state">
      <p>검수할 문서를 선택하거나, 왼쪽에서 필드를 클릭하세요.</p>
    </div>

    <div id="review-card" style="display:none">
      <div id="crop-container">
        <img id="crop-image" src="" alt="필드 이미지">
      </div>

      <div class="field-info">
        <span id="field-label" class="field-label"></span>
        <span id="field-type-badge" class="type-badge"></span>
        <span id="confidence-badge" class="confidence-badge"></span>
      </div>

      <div class="edit-row">
        <label for="edit-input">수정:</label>
        <input id="edit-input" type="text" placeholder="OCR 결과 수정..." autocomplete="off">
        <button id="btn-confirm" class="btn-primary" title="확인 (Enter)">확인</button>
        <button id="btn-skip" title="건너뛰기 (Esc)">건너뛰기</button>
      </div>

      <div id="candidates-list" class="candidates">
        <h4>후보:</h4>
        <ul id="candidates-items"></ul>
      </div>

      <div id="group-section" style="display:none">
        <h4>연관 필드 그룹</h4>
        <ul id="group-fields"></ul>
      </div>

      <div id="warning-box" style="display:none" class="warning-box"></div>
    </div>

    <div id="doc-progress-section">
      <div class="progress-bar-outer">
        <div id="doc-progress-bar" class="progress-bar-inner" style="width:0%"></div>
      </div>
      <span id="doc-progress-text">0/0 필드 완료</span>
    </div>

    <div id="al-notification" style="display:none" class="al-notification"></div>
  </section>
</main>

<div id="toast-container"></div>

<script src="/static/review.js"></script>
</body>
</html>
